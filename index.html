<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicadores das Caixas de Contribuição</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12303c;
    --ink-soft:#3c5b66;
    --paper:#f2f1ec;
    --paper-raised:#ffffff;
    --line:#c9cabf;
    --line-soft:#dedfd6;
    --gold:#a9791f;
    --gold-soft:#e8dcbd;
    --ok:#3d7a4f;
    --shadow:0 1px 2px rgba(18,48,60,0.06), 0 6px 16px rgba(18,48,60,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:36px 20px 80px;}

  .masthead{
    text-align:center;
    padding:8px 0 28px;
    border-bottom:2px solid var(--ink);
    margin-bottom:28px;
    position:relative;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
  }
  h1{
    font-family:'Source Serif 4',serif;
    font-weight:700;
    font-size:clamp(24px,4.2vw,38px);
    letter-spacing:.01em;
    margin:0 0 10px;
    line-height:1.15;
  }
  .subtitle{
    font-size:14px;
    color:var(--ink-soft);
    max-width:560px;
    margin:0 auto;
    line-height:1.5;
  }

  .statusbar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:28px;
    min-height:18px;
  }
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--line);transition:background .2s;}
  .status-dot.saving{background:var(--gold);animation:pulse 1s infinite;}
  .status-dot.saved{background:var(--ok);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  .tabs{
    display:flex;
    gap:2px;
    justify-content:center;
    margin-bottom:32px;
    flex-wrap:wrap;
  }
  .tab{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:12px 22px;
    background:var(--paper-raised);
    border:1px solid var(--line);
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s;
  }
  .tab:hover{border-color:var(--ink);color:var(--ink);}
  .tab.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }
  .tab .count{
    display:block;
    font-size:10px;
    opacity:.7;
    margin-top:3px;
    font-weight:500;
  }

  .day-panel{display:none;}
  .day-panel.active{display:block;}

  .day-heading{
    font-family:'Source Serif 4',serif;
    font-size:20px;
    font-weight:600;
    margin:0 0 20px;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:12px;
  }
  .day-heading .fill{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    font-weight:500;
    color:var(--ink-soft);
    white-space:nowrap;
  }

  .turno{
    background:var(--paper-raised);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    margin-bottom:22px;
    overflow:hidden;
  }
  .turno-head{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:16px 18px;
    background:linear-gradient(180deg,#fbfaf7,#f6f5f0);
    border-bottom:1px solid var(--line-soft);
  }
  .turno-num{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    font-weight:600;
    color:var(--paper);
    background:var(--ink);
    width:28px;height:28px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .turno-titles{flex:1;min-width:0;}
  .turno-title{font-weight:600;font-size:14px;margin:0 0 2px;color:var(--ink);}
  .turno-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.4;margin:0;}

  table.vagas{
    width:100%;
    border-collapse:collapse;
  }
  table.vagas thead th{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    text-align:left;
    font-weight:500;
    padding:9px 12px;
    border-bottom:1px solid var(--line-soft);
    background:#fafaf7;
  }
  table.vagas thead th.col-num{width:44px;text-align:center;}
  table.vagas tbody td{
    border-bottom:1px solid var(--line-soft);
    border-right:1px solid var(--line-soft);
    padding:0;
  }
  table.vagas tbody tr:last-child td{border-bottom:none;}
  table.vagas tbody td:last-child{border-right:none;}
  table.vagas tbody td.col-num{
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    font-weight:600;
    color:var(--gold);
    vertical-align:middle;
    background:#fafaf7;
  }
  .cell-input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    color:var(--ink);
    padding:10px 12px;
    transition:background .15s;
  }
  .cell-input::placeholder{color:#a9ab9f;}
  .cell-input:focus{background:var(--gold-soft);}
  tr.filled .col-num{background:#eef3ea;color:var(--ok);}
  tr.filled td{background:#fbfdfa;}

  @media (max-width:640px){
    table.vagas, table.vagas thead, table.vagas tbody, table.vagas tr, table.vagas td{display:block;}
    table.vagas thead{display:none;}
    table.vagas tbody tr{
      border-bottom:1px solid var(--line-soft);
      padding:12px 14px 14px;
      display:grid;
      grid-template-columns:28px 1fr;
      gap:2px 10px;
    }
    table.vagas tbody tr:last-child{border-bottom:none;}
    table.vagas tbody td{border:none;padding:0;}
    table.vagas tbody td.col-num{
      grid-row:1/4;
      text-align:left;
      background:none;
      padding-top:9px;
    }
    .cell-input{padding:7px 8px;border:1px solid var(--line-soft);margin-bottom:4px;background:#fff;border-radius:3px;}
    .cell-input:focus{background:var(--gold-soft);}
  }

  footer{
    text-align:center;
    margin-top:36px;
    font-size:11.5px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="eyebrow">Escala de voluntários</div>
    <h1>INDICADORES DAS CAIXAS DE CONTRIBUIÇÃO</h1>
    <p class="subtitle">Escolha um horário disponível e preencha seu nome, telefone e congregação. O salvamento é automático — não é preciso login.</p>
  </div>

  <div class="statusbar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Pronto</span>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="panels"></div>

  <footer>Página livre e compartilhável — os dados preenchidos ficam visíveis para todos que tiverem o link.</footer>
</div>

<script type="importmap">
{
  "imports": {
    "firebase-app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase-database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
  }
}
</script>
<script type="module" src="app.js"></script>
</body>
</html>
